<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de listas</title>
    <!-- iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- css -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAV -->

    <nav>
        <div class="container container-nav">

            <h1>
                <a href="../">Oso Tripolar</a>
            </h1>
        
        </div>
    </nav>

    <!-- MAIN -->

    <main>
        <div class="container container-main">
            
            <h1>Lista Dinámica </h1>

            <button id="btnListEdit">Administrar Listas</button>

            <p>En este ejercicio creamos un bloc de notas dinámico dónde podemos clasificar por Listas, a su vez estas también son dinámicas</p>
            
            <div class="form">
                <label for="inputNote">Nueva Nota</label>
                <input type="text" id="inputNote">
                <select name="Lists" id="listOptions">
                    <option value="" selected>Seleccione una lista</option>
                </select>
                <button id="addNoteBtn">Send</button>
            </div>
            
            <div class="lists" id="btnLists">
                <button class="btnActive"> All </button>
            </div>
            
            <div class="notes" id="notesContainer">
                <ul class>
                    <p class="italic">Vacío: inserte una nota</p>
                </ul>
            </div>

        </div>
    </main>

    <!-- FOOTER -->

    <footer>
        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </footer>

    <!-- MODALS -->

    <!-- <div class="container-modal" id="modalEditNote">
        <div class="modal">
            <h1>Editar Nota</h1>
            <div class="form">
                <label for="inputEditNote">Editar:</label>
                <input type="text" id="inputEditNote">
                <br>
                <select name="" id=""></select>
            </div>
            <button id="closeModalEditNote">cerrar</button>
        </div>
    </div> -->

    <div class="container-modal" id="modalEditNote">
        <div class="modal">
            <h1>Editar Nota</h1>

            <div class="form">
                <label for="inputEditNote">Editar:</label>
                <input type="text" id="inputEditNote">
                <br>
                <select name="Lists" id="listOptionsModalEditNote">
                    <option value="" selected>Seleccione una lista</option>
                </select>
            </div>
            
            <div class="modal-buttons" style="margin-top: auto;">
                <button id="">Actualizar</button>
                <button id="closeModalEditNote">cerrar</button>
            </div>

        </div>
    </div>

    <!-- TEMPLATE -->

    <template id="noteTemplate">

        <li class="note">
            <p>Vacío: inserte una nota</p>
            <div class="btnActions">
                <button class="btn--edit">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn--delete">
                    <i class="bi bi-trash3"></i>
                </button>
            </div>
        </li>

    </template>

    <!-- JS -->

    <script src="app.js" type="module"></script>

</body>
</html>

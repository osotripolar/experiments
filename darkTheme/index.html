<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiments: Dark Theme</title>
    <!-- iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- css -->
    <link rel="stylesheet" href="styles.css">
    <!-- js : theme -->
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
</head>
<body>

        <nav>

            <div class="nav-logo">
                <h1 class="logo">Experiments</h1>
            </div>
            
            
            <div class="theme-container">
                
                <!-- Toogle Checkbox Theme-->
                <label class="label-toogle" for="themeModeInput">
                    <i class="bi bi-moon-fill" id="iconTheme"></i>
                </label>
                <input type="checkbox" id="themeModeInput">
                
            </div>
            
        </nav>
            
    <main>

        <div class="container container-main">

            <h1>Tema Oscuro</h1>
    
            <div class="message">
    
                <p>Haz click en el ícono para cambiar al modo oscuro</p>
                
            </div>

        </div>

    </main>



    
    <script src="app.js"></script>

</body>
</html>
